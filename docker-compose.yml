services:
  postgres:
    image: postgres:17-alpine
    container_name: puls-postgres
    environment:
      POSTGRES_DB: health_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - puls-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d health_app']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  puls-postgres-data:
